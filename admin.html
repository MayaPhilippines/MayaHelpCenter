<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Admin · Maya Fintech</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
      background: #030807;
    }

    /* Dark black-to-emerald green gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #0d2a1e 0%, #030807 70%);
      z-index: 0;
    }

    /* Ambient glowing light effects */
    .ambient-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient-glow.top-right {
      width: 500px;
      height: 500px;
      top: -100px;
      right: -100px;
      background: radial-gradient(circle, rgba(46, 242, 163, 0.06) 0%, transparent 70%);
    }

    .ambient-glow.bottom-left {
      width: 400px;
      height: 400px;
      bottom: -80px;
      left: -80px;
      background: radial-gradient(circle, rgba(46, 242, 163, 0.04) 0%, transparent 70%);
    }

    /* ========== MAIN CONTAINER ========== */
    .admin-container {
      max-width: 860px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* ========== GLASS PANEL ========== */
    .glass-panel {
      background: rgba(8, 18, 14, 0.70);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 48px;
      padding: 2.5rem 2.5rem 1.8rem;
      border: 1px solid rgba(46, 242, 163, 0.15);
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9),
                  inset 0 1px 1px rgba(46, 242, 163, 0.08),
                  inset 0 -2px 4px rgba(0, 20, 10, 0.3);
      background-image: linear-gradient(145deg, rgba(15, 40, 30, 0.30) 0%, rgba(0, 10, 5, 0.50) 100%);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.4s ease, border-color 0.4s;
    }

    /* Neon green outline - glowing border */
    .glass-panel::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(46, 242, 163, 0.35), rgba(46, 242, 163, 0.02), rgba(46, 242, 163, 0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.8;
    }

    /* Inner glow effect */
    .glass-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 48px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46, 242, 163, 0.02), transparent 70%);
      pointer-events: none;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .maya-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(46, 242, 163, 0.15));
    }

    .maya-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .admin-badge {
      background: linear-gradient(135deg, rgba(46, 242, 163, 0.12), rgba(46, 242, 163, 0.04));
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #2EF2A3;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(46, 242, 163, 0.08);
      margin-left: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.8rem;
    }

    .view-site-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(46, 242, 163, 0.08);
      color: rgba(255, 255, 255, 0.5);
      padding: 0.5rem 1.4rem;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
    }

    .view-site-btn:hover {
      background: rgba(46, 242, 163, 0.06);
      border-color: rgba(46, 242, 163, 0.15);
      color: #fff;
      box-shadow: 0 0 30px rgba(46, 242, 163, 0.03);
    }

    /* ========== DASHBOARD GRID ========== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
      max-width: 300px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(46, 242, 163, 0.06);
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      border-color: rgba(46, 242, 163, 0.12);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.5);
    }

    .stat-icon {
      font-size: 2.2rem;
      opacity: 0.5;
    }

    .stat-info {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .stat-value {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ========== FORM PANEL ========== */
    .form-panel {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 28px;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(46, 242, 163, 0.04);
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(4px);
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .form-icon {
      font-size: 1.5rem;
      opacity: 0.6;
    }

    .form-text {
      display: flex;
      flex-direction: column;
    }

    .form-title {
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .form-subtitle {
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.75rem;
      font-weight: 400;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .form-group label {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .input-wrapper {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .input-wrapper input {
      flex: 1;
      background: rgba(0, 0, 0, 0.30);
      border: 1px solid rgba(46, 242, 163, 0.06);
      border-radius: 18px;
      padding: 0.9rem 1.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .input-wrapper input:focus {
      border-color: rgba(46, 242, 163, 0.20);
      box-shadow: 0 0 40px rgba(46, 242, 163, 0.04);
      background: rgba(0, 0, 0, 0.35);
    }

    .deploy-btn {
      background: linear-gradient(135deg, #2EF2A3, #1bcb86);
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 18px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: #031009;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      white-space: nowrap;
      box-shadow: 0 0 40px rgba(46, 242, 163, 0.08);
      letter-spacing: 0.02em;
    }

    .deploy-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 60px rgba(46, 242, 163, 0.15);
    }

    .deploy-btn:active {
      transform: scale(0.97);
    }

    .deploy-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-hint {
      color: rgba(255, 255, 255, 0.12);
      font-size: 0.7rem;
      font-weight: 400;
      margin-top: 0.1rem;
    }

    /* ========== LINKS PANEL ========== */
    .links-panel {
      background: rgba(0, 0, 0, 0.10);
      border-radius: 28px;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(46, 242, 163, 0.03);
      margin-bottom: 1.8rem;
      min-height: 200px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(4px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .panel-title {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .panel-count {
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.75rem;
      font-weight: 400;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* ========== LINK ITEM ========== */
    .link-item {
      background: rgba(0, 0, 0, 0.20);
      border-radius: 18px;
      padding: 0.9rem 1.4rem;
      border: 1px solid rgba(46, 242, 163, 0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.4s ease;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .link-item:hover {
      border-color: rgba(46, 242, 163, 0.08);
      background: rgba(0, 0, 0, 0.30);
    }

    .link-info {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex: 1;
      min-width: 0;
    }

    .link-hash {
      font-family: 'Inter', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2EF2A3;
      background: rgba(46, 242, 163, 0.04);
      padding: 0.25rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(46, 242, 163, 0.04);
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(46, 242, 163, 0.05);
    }

    .link-clicks {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255, 255, 255, 0.20);
      font-size: 0.75rem;
    }

    .link-clicks .click-count {
      color: #ffffff;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .link-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .delete-btn {
      background: rgba(255, 50, 50, 0.04);
      border: 1px solid rgba(255, 50, 50, 0.04);
      color: rgba(255, 50, 50, 0.30);
      padding: 0.3rem 1rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .delete-btn:hover {
      background: rgba(255, 50, 50, 0.08);
      border-color: rgba(255, 50, 50, 0.10);
      color: #ff5555;
    }

    .delete-btn:active {
      transform: scale(0.95);
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      gap: 0.3rem;
    }

    .empty-icon {
      font-size: 2.8rem;
      opacity: 0.10;
      margin-bottom: 0.3rem;
    }

    .empty-state p {
      color: rgba(255, 255, 255, 0.20);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .empty-state .empty-sub {
      color: rgba(255, 255, 255, 0.08);
      font-size: 0.75rem;
    }

    /* ========== FOOTER ========== */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      position: relative;
      z-index: 1;
    }

    .footer-text {
      color: rgba(255, 255, 255, 0.10);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .footer-version {
      color: rgba(255, 255, 255, 0.05);
      font-size: 0.65rem;
      font-weight: 400;
    }

    /* ========== TOAST ========== */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(3, 8, 7, 0.90);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 0.8rem 1.8rem;
      border-radius: 18px;
      border: 1px solid rgba(46, 242, 163, 0.10);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 9998;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
      animation: toastSlideUp 0.3s ease;
      max-width: 85%;
      text-align: center;
    }

    .toast-message.error {
      border-color: rgba(255, 50, 50, 0.15);
    }

    @keyframes toastSlideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes toastSlideDown {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 820px) {
      .glass-panel {
        padding: 1.8rem 1.5rem 1.2rem;
        border-radius: 36px;
      }

      .dashboard-grid {
        max-width: 100%;
      }

      .input-wrapper {
        flex-direction: column;
      }

      .input-wrapper input {
        width: 100%;
      }

      .deploy-btn {
        width: 100%;
        justify-content: center;
      }

      .link-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }

      .link-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }

      .admin-badge {
        margin-left: 0;
      }

      .view-site-btn {
        width: 100%;
        justify-content: center;
      }

      .form-panel {
        padding: 1.2rem 1.2rem;
      }

      .links-panel {
        padding: 1.2rem 1.2rem;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 0.8rem;
      }

      .glass-panel {
        padding: 1.2rem 0.8rem 1rem;
        border-radius: 28px;
      }

      .maya-text {
        font-size: 1.1rem;
      }

      .maya-logo {
        width: 28px;
        height: 28px;
      }

      .stat-value {
        font-size: 1.6rem;
      }

      .link-hash {
        font-size: 0.75rem;
        padding: 0.2rem 0.8rem;
      }
    }

    @media (min-width: 821px) and (max-width: 1024px) {
      .admin-container {
        max-width: 720px;
      }
    }
  </style>
</head>
<body>
  <!-- Ambient glow effects -->
  <div class="ambient-glow top-right"></div>
  <div class="ambient-glow bottom-left"></div>

  <div class="admin-container">
    <!-- Main Glass Panel -->
    <div class="glass-panel">
      
      <!-- Header -->
      <div class="header">
        <div class="logo-wrapper">
          <img src="images/maya_icon.png" alt="Maya" class="maya-logo" />
          <span class="maya-text">maya</span>
          <span class="admin-badge">✦ ADMIN</span>
        </div>
        <div class="header-actions">
          <a href="index.html" class="view-site-btn">
            <span class="btn-icon">👁</span>
            View Site
          </a>
        </div>
      </div>

      <!-- Stats Dashboard -->
      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-icon">👆</div>
          <div class="stat-info">
            <div class="stat-label">Total Clicks</div>
            <div class="stat-value" id="totalClicks">0</div>
          </div>
        </div>
      </div>

      <!-- Form Panel -->
      <div class="form-panel">
        <div class="form-header">
          <div class="form-icon">🚀</div>
          <div class="form-text">
            <span class="form-title">Deploy New Link</span>
            <span class="form-subtitle">Add a redirect URL for the Claim button</span>
          </div>
        </div>
        <div class="form-group">
          <label for="linkInput">Maya Link / URL</label>
          <div class="input-wrapper">
            <input type="url" id="linkInput" placeholder="https://maya.com/your-link-here" />
            <button class="deploy-btn" id="deployBtn">
              <span class="btn-icon">✦</span>
              Deploy
            </button>
          </div>
          <div class="form-hint">The link will be displayed as a hash in the dashboard</div>
        </div>
      </div>

      <!-- Links Dashboard Panel -->
      <div class="links-panel">
        <div class="panel-header">
          <span class="panel-title">📋 Deployed Links</span>
          <span class="panel-count" id="linkCount">0 links</span>
        </div>
        <div class="links-list" id="linksList">
          <!-- Links will be rendered here -->
          <div class="empty-state">
            <span class="empty-icon">🔗</span>
            <p>No links deployed yet</p>
            <span class="empty-sub">Add a link using the form above</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span class="footer-text">✦ Premium Fintech · Admin Panel</span>
        <span class="footer-version">v2.0</span>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // FIREBASE CONFIGURATION
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCjTn-hyUdZGiDHsy5_ijYu6KQCYMElsTI",
      authDomain: "casinorewards-95502.firebaseapp.com",
      databaseURL: "https://casinorewards-95502-default-rtdb.firebaseio.com",
      projectId: "casinorewards-95502",
      storageBucket: "casinorewards-95502.firebasestorage.app",
      messagingSenderId: "768311187647",
      appId: "1:768311187647:web:f6208b0d80a1c3a2634e0a",
      measurementId: "G-831RDLPWSJ"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ============================================================
    // MAIN SCRIPT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Admin panel loaded - Initializing...');

      // DOM Elements
      const linkInput = document.getElementById('linkInput');
      const deployBtn = document.getElementById('deployBtn');
      const linksList = document.getElementById('linksList');
      const totalClicksEl = document.getElementById('totalClicks');
      const linkCountEl = document.getElementById('linkCount');

      // Generate short hash
      function generateHash(url) {
        let hash = 0;
        for (let i = 0; i < url.length; i++) {
          const char = url.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        const hashStr = Math.abs(hash).toString(36).substring(0, 8);
        return `#${hashStr}`;
      }

      // Show toast notification
      function showToast(message, isError = false) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) {
          existingToast.remove();
        }
        
        const toast = document.createElement('div');
        toast.className = 'toast-message' + (isError ? ' error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.animation = 'toastSlideDown 0.3s ease';
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 3000);
      }

      // Deploy new link
      function deployLink() {
        const url = linkInput.value.trim();
        
        if (!url) {
          showToast('⚠️ Please enter a valid URL', true);
          return;
        }
        
        try {
          new URL(url);
        } catch {
          showToast('⚠️ Please enter a valid URL format (include https://)', true);
          return;
        }
        
        // Disable button to prevent double click
        deployBtn.disabled = true;
        deployBtn.innerHTML = '<span class="btn-icon">⏳</span> Deploying...';
        
        const hash = generateHash(url);
        const linkId = database.ref('links').push().key;
        
        const linkData = {
          url: url,
          hash: hash,
          clicks: 0,
          createdAt: firebase.database.ServerValue.TIMESTAMP
        };
        
        database.ref('links/' + linkId).set(linkData)
          .then(() => {
            showToast('✅ Link deployed successfully!');
            linkInput.value = '';
            deployBtn.disabled = false;
            deployBtn.innerHTML = '<span class="btn-icon">✦</span> Deploy';
          })
          .catch((error) => {
            showToast('❌ Error deploying link: ' + error.message, true);
            deployBtn.disabled = false;
            deployBtn.innerHTML = '<span class="btn-icon">✦</span> Deploy';
          });
      }

      // Delete link
      function deleteLink(linkId) {
        if (!confirm('Are you sure you want to delete this link?')) return;
        
        database.ref('links/' + linkId).remove()
          .then(() => {
            showToast('🗑️ Link deleted successfully');
          })
          .catch((error) => {
            showToast('❌ Error deleting link: ' + error.message, true);
          });
      }

      // Load links from Firebase with real-time updates
      function loadLinks() {
        database.ref('links').orderByChild('createdAt').on('value', (snapshot) => {
          const links = snapshot.val();
          const linksListEl = document.getElementById('linksList');
          let totalClicks = 0;
          let totalLinks = 0;
          
          if (!links) {
            linksListEl.innerHTML = `
              <div class="empty-state">
                <span class="empty-icon">🔗</span>
                <p>No links deployed yet</p>
                <span class="empty-sub">Add a link using the form above</span>
              </div>
            `;
            updateStats(0);
            return;
          }
          
          let html = '';
          const linkIds = Object.keys(links);
          
          linkIds.forEach((id) => {
            const link = links[id];
            totalLinks++;
            totalClicks += link.clicks || 0;
            
            const displayHash = link.hash || generateHash(link.url);
            
            html += `
              <div class="link-item" data-id="${id}">
                <div class="link-info">
                  <span class="link-hash">${displayHash}</span>
                  <div class="link-clicks">
                    👆 <span class="click-count">${link.clicks || 0}</span>
                  </div>
                </div>
                <div class="link-actions">
                  <button class="delete-btn" onclick="deleteLink('${id}')">Delete</button>
                </div>
              </div>
            `;
          });
          
          linksListEl.innerHTML = html;
          updateStats(totalClicks);
          linkCountEl.textContent = `${totalLinks} links`;
        });
      }

      // Update stats dashboard
      function updateStats(totalClicks) {
        totalClicksEl.textContent = totalClicks;
      }

      // ========== EVENT LISTENERS ==========
      deployBtn.addEventListener('click', deployLink);

      linkInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          deployLink();
        }
      });

      // ========== INITIALIZE ==========
      loadLinks();

      // Make deleteLink available globally
      window.deleteLink = deleteLink;
      
      console.log('Admin panel initialized successfully');
    });
  </script>
</body>
</html>
